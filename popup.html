<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rainmatter Air</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">Rainmatter Foundation</p>
          <h1>Rainmatter Air</h1>
          <p class="sub">Pollution data at a glance, for every Indian citizen.</p>
        </div>
        <button id="refresh" class="ghost" type="button">Refresh</button>
      </header>

      <section class="scorecard">
        <div class="score-label" id="score-label">Current AQI</div>
        <div class="score" id="aqi">—</div>
        <div class="category" id="category">Loading…</div>
        <div class="message" id="message"></div>
        <div class="snapshot-state" id="snapshot-state" role="status" aria-live="polite">Loading cached reading…</div>
      </section>

      <section class="meta">
        <div><span>Location</span><strong id="location">—</strong></div>
        <div><span>Updated</span><strong id="updated" title="">—</strong></div>
        <div><span>Source</span><strong id="source">—</strong></div>
      </section>

      <section>
        <h2>Pollutants</h2>
        <div id="measurements" class="measurements"></div>
      </section>

      <footer class="footer">
        <a href="options.html" target="_blank" rel="noreferrer">Settings</a>
        <a href="#" id="open-source-link">Project setup</a>
      </footer>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
